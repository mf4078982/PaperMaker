<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paper Preview</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow-lg p-4">
    <h2 id="paperTitle"></h2>
    <h6 id="paperInfo" class="text-muted"></h6>
    <hr>

    <ol id="questionsList">
      <!-- Random demo questions generate honge -->
    </ol>

    <div class="mt-4 text-center">
      <button class="btn btn-success">Download PDF</button>
      <button class="btn btn-secondary">Save to My Papers</button>
    </div>
  </div>
</div>

<script>
  // URL se data read karna
  const params = new URLSearchParams(window.location.search);
  const title = params.get("title");
  const subject = params.get("subject");
  const numQ = params.get("numQ");
  const difficulty = params.get("difficulty");
  const type = params.get("type");

  document.getElementById("paperTitle").textContent = title || "Untitled Paper";
  document.getElementById("paperInfo").textContent = `Subject: ${subject}, Questions: ${numQ}, Difficulty: ${difficulty}, Type: ${type}`;

  const questionsList = document.getElementById("questionsList");

  // Demo questions (backend ke sath real data aayega)
  for (let i = 1; i <= numQ; i++) {
    let li = document.createElement("li");
    li.textContent = `Sample Question ${i} (${difficulty} - ${type})`;
    questionsList.appendChild(li);
  }
</script>

</body>
</html>

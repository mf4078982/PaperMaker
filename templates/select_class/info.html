{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Select Class & Subject</title>
    <link rel="stylesheet" href="{% static 'info_css/info.css' %}">
</head>

<body>

    <div class="card">
        <h3 class="form-title">Select Class & Subject</h3>
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="subject"></label>
                <select name="subject" id="subject" required>
                    <option value="" disabled selected>Select Subject</option>
                    <option value="English">English</option>
                    <option value="Urdu">Urdu</option>
                    <option value="Math">Math</option>
                    <option value="Science">Science</option>
                    <option value="Drawing">Drawing</option>
                    <option value="G.K, Poem & Speech">G.K, Poem &amp; Speech</option>
                </select>
            </div>

            <div class="form-group">
                <label for="class_name"></label>
                <select name="class_name" id="class_name" required>
                    <option value="" disabled selected>Select Class</option>
                    <option value="Play">Play</option>
                    <option value="Nursery">Nursery</option>
                    <option value="Prep">Prep</option>
                    <option value="One">One</option>
                    <option value="Two">Two</option>
                    <option value="Three">Three</option>
                </select>
            </div>

            <div class="form-group">
                <label for="exam"></label>
                <select name="exam" id="exam" required>
                    <option value="" disabled selected>Select Exam</option>
                    <option value="First Term">First Term</option>
                    <option value="Second Term">Second Term</option>
                    <option value="Third Term">Third Term</option>
                </select>
            </div>

            <div class="form-group">
                <label for="year"></label>
                <select name="year" id="year" required>
                    <option value="" disabled selected>Select Year</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">Proceed</button>
        </form>
    </div>

</body>

</html>
